<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коты и просторы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Пустышка для будущей картинки -->
        <div id="image-placeholder">
            <div class="placeholder-text">🐾 Здесь будет изображение 🐾</div>
        </div>

        <!-- Экран создания персонажа -->
        <div id="creation-screen">
            <h2>Создание персонажа</h2>
            
            <div class="form-group">
                <label for="cat-name">Имя:</label>
                <input type="text" id="cat-name" placeholder="Введите имя" maxlength="20">
            </div>

            <div class="form-group">
                <label>Пол:</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="кот" checked> Кот</label>
                    <label><input type="radio" name="gender" value="кошка"> Кошка</label>
                </div>
            </div>

            <div class="form-group">
                <label for="location-select">Место проживания:</label>
                <select id="location-select"></select>
                <div id="location-stats" class="stats-info"></div>
            </div>

            <h3>Окрас</h3>
            <div id="appearance-editor"></div>
            
            <div class="form-group">
                <label>Итоговая внешность:</label>
                <div id="appearance-preview" class="preview-box"></div>
                <button id="random-appearance" class="btn-small">🎲 Случайная внешность</button>
            </div>

            <button id="start-game" class="btn-primary">Начать игру</button>
        </div>

        <!-- Экран игры (пустышка) -->
        <div id="game-screen" style="display: none;">
            <h2>Игра</h2>
            <div id="character-summary"></div>
            <p>Основной игровой процесс будет здесь...</p>
            <button id="reset-character" class="btn-danger">Сбросить персонажа</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
