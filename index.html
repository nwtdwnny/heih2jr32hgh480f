<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коты и просторы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Пустышка для будущей картинки -->
        <div id="image-placeholder">
            <div class="placeholder-text">🐾 Здесь будет изображение 🐾</div>
        </div>

        <!-- Экран создания персонажа -->
        <div id="creation-screen">
            <h2>Создание персонажа</h2>
            
            <div class="form-group">
                <label for="cat-name">Имя:</label>
                <input type="text" id="cat-name" placeholder="Введите имя" maxlength="20">
            </div>

            <div class="form-group">
                <label>Пол:</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="кот" checked> Кот</label>
                    <label><input type="radio" name="gender" value="кошка"> Кошка</label>
                </div>
            </div>

            <div class="form-group">
                <label for="location-select">Место проживания:</label>
                <select id="location-select"></select>
                <div id="location-stats" class="stats-info"></div>
            </div>

            <h3>Окрас</h3>
            <div id="appearance-editor"></div>
            
            <div class="form-group">
                <label>Итоговая внешность:</label>
                <div id="appearance-preview" class="preview-box"></div>
                <button id="random-appearance" class="btn-small">🎲 Случайная внешность</button>
            </div>

            <button id="start-game" class="btn-primary">Начать игру</button>
        </div>

        <!-- Экран игры -->
        <div id="game-screen" style="display: none;">
            <div class="game-header">
                <h2>🌍 Мир котов</h2>
                <div id="season-display" class="season-badge">🌸 Весна</div>
            </div>
            
            <div id="character-summary"></div>
            
            <!-- Параметры персонажа -->
            <div class="stats-panel">
                <h3>Состояние</h3>
                <div class="stat-bar">
                    <span class="stat-label">❤️ Здоровье</span>
                    <div class="bar-bg"><div id="health-bar" class="bar-fill health-fill" style="width: 100%"></div></div>
                    <span id="health-value" class="stat-value">100/100</span>
                </div>
                <div class="stat-bar">
                    <span class="stat-label">⚡ Энергия</span>
                    <div class="bar-bg"><div id="energy-bar" class="bar-fill energy-fill" style="width: 100%"></div></div>
                    <span id="energy-value" class="stat-value">100/100</span>
                </div>
                <div class="stat-bar">
                    <span class="stat-label">🍖 Голод</span>
                    <div class="bar-bg"><div id="hunger-bar" class="bar-fill hunger-fill" style="width: 100%"></div></div>
                    <span id="hunger-value" class="stat-value">100/100</span>
                </div>
                <div class="stat-bar">
                    <span class="stat-label">💧 Жажда</span>
                    <div class="bar-bg"><div id="thirst-bar" class="bar-fill thirst-fill" style="width: 100%"></div></div>
                    <span id="thirst-value" class="stat-value">100/100</span>
                </div>
                <div class="stat-bar">
                    <span class="stat-label">✨ Чистота</span>
                    <div class="bar-bg"><div id="cleanliness-bar" class="bar-fill clean-fill" style="width: 100%"></div></div>
                    <span id="cleanliness-value" class="stat-value">100/100</span>
                </div>
                <div class="stat-bar">
                    <span class="stat-label">😊 Настроение</span>
                    <div class="bar-bg"><div id="mood-bar" class="bar-fill mood-fill" style="width: 100%"></div></div>
                    <span id="mood-value" class="stat-value">100/100</span>
                </div>
            </div>

            <!-- Временная заглушка для действий -->
            <div class="actions-placeholder">
                <p>⚙️ Действия появятся позже...</p>
            </div>
            
            <button id="reset-character" class="btn-danger">Сбросить персонажа</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
